<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue & Return | LibroFlow Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-width: 280px;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
        }

        /* --- Admin Sidebar --- */
 .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #1e293b; /* Darker sidebar for Admin mode */
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 0 15px 5px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: #fff !important;
        }

        .nav-link.active { border-left: 4px solid var(--primary); }

        /* --- Main Layout --- */

        .main-wrapper {
            margin-left: var(--sidebar-width);
            padding: 2rem;
        }

        /* --- Transaction Cards --- */
        .transaction-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #e2e8f0;
            height: 100%;
        }

        .input-group-text {
            background: #f8fafc;
            border-right: none;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--primary);
        }

        .scanner-simulation {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            color: #64748b;
            cursor: pointer;
            transition: 0.3s;
        }

        .scanner-simulation:hover {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
        }

        .book-preview-small {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

   <div class="sidebar shadow">
        <div class="p-4">
            <h4 class="fw-bold text-white mb-5"><i class="bi bi-shield-check text-primary me-2"></i> LIBRO ADMIN</h4>
            <nav class="nav flex-column">
                <a href="admin-dashborad.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Overview</a>
                <a href="admin-manage-books.html" class="nav-link"><i class="bi bi-book me-2"></i> Manage Books</a>
                <a href="admin-members.html" class="nav-link"><i class="bi bi-people me-2"></i> Member Directory</a>
                <a href="admin-transactions.html" class="nav-link active"><i class="bi bi-arrow-left-right me-2"></i> Issue/Return</a>
                <a href="admin-financials.html" class="nav-link"><i class="bi bi-cash-stack me-2"></i> Financials</a>
                <a href="admin-settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> System Settings</a>
            </nav>
        </div>
        <div class="mt-auto p-4">
            <a href="admin-exit.html" class="nav-link text-danger"><i class="bi bi-power me-2"></i> System Exit</a>
        </div>
    </div>

    <main class="main-wrapper">
        <header class="mb-4">
            <h2 class="fw-800">Circulation Desk</h2>
            <p class="text-muted">Process new loans or manage book returns.</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="transaction-card shadow-sm">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-primary-subtle text-primary p-2 rounded-3 me-3">
                            <i class="bi bi-journal-plus fs-4"></i>
                        </div>
                        <h4 class="fw-bold mb-0">Issue New Book</h4>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">MEMBER ID / SCAN CARD</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" class="form-control" placeholder="Enter Member ID (e.g. LIB-9920)">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">BOOK ISBN / BARCODE</label>
                            <div class="scanner-simulation mb-2">
                                <i class="bi bi-qr-code-scan fs-1 d-block mb-2"></i>
                                <span>Click to simulate Barcode Scan</span>
                            </div>
                            <input type="text" class="form-control" placeholder="Or enter ISBN manually">
                        </div>

                        <div class="row mb-4">
                            <div class="col">
                                <label class="form-label small fw-bold text-muted">DUE DATE</label>
                                <input type="date" class="form-control" value="2026-03-19">
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary w-100 py-3 fw-bold rounded-3">
                            Confirm Loan <i class="bi bi-check2-circle ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="transaction-card shadow-sm border-top border-4 border-success">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-success-subtle text-success p-2 rounded-3 me-3">
                            <i class="bi bi-journal-check fs-4"></i>
                        </div>
                        <h4 class="fw-bold mb-0">Process Return</h4>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">SCAN RETURNED BOOK</label>
                        <div class="input-group mb-3">
                            <input type="text" class="form-control py-2" placeholder="Scan or enter Book ID...">
                            <button class="btn btn-dark px-4">Identify</button>
                        </div>
                    </div>

                    <div class="book-preview-small border">
                        <div class="bg-white p-2 rounded shadow-sm border">
                            <i class="bi bi-book text-muted fs-3"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold small">Refactoring UI</div>
                            <div class="text-muted" style="font-size: 0.75rem;">Borrowed by: <strong>Steve Krug</strong></div>
                        </div>
                        <div class="text-end">
                            <div class="small text-danger fw-bold">Overdue</div>
                            <div class="small fw-800">₦2.50 Fine</div>
                        </div>
                    </div>

                    <div class="mt-4 p-3 bg-light rounded-3">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="conditionCheck" checked>
                            <label class="form-check-label small" for="conditionCheck">Book condition is good</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="fineCheck">
                            <label class="form-check-label small" for="fineCheck">Collect fine now</label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-success w-100 py-3 fw-bold rounded-3 mt-4">
                        Complete Return <i class="bi bi-arrow-down-left-circle ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
