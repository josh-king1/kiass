<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access LibroFlow | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth-style.css">
</head>
<body>

    <div class="auth-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-md-10 col-lg-8">
                    <div class="auth-card shadow-xl overflow-hidden">
                        <div class="row g-0">
                            <div class="col-md-5 bg-primary p-5 text-white d-none d-md-flex flex-column justify-content-center">
                                <h2 class="fw-800 mb-3">Welcome Back!</h2>
                                <p class="opacity-75 mb-4">Access your personalized library dashboard, track your loans, and explore new arrivals.</p>
                                <div class="auth-benefit">
                                    <small class="d-block mb-2">✓ Secure Encryption</small>
                                    <small class="d-block mb-2">✓ 24/7 Access</small>
                                    <small class="d-block">✓ Real-time Notifications</small>
                                </div>
                            </div>
                            
                            <div class="col-md-7 bg-white p-5">
                                <div class="text-center mb-4">
                                    <a href="index.html" class="text-decoration-none fw-800 text-primary fs-4">LIBROFLOW</a>
                                    <h4 class="mt-3 fw-600">Account Login</h4>
                                    <p class="text-muted small">Please enter your credentials to continue</p>
                                </div>

                                <form>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-secondary">STUDENT / STAFF ID</label>
                                        <input type="text" class="form-control auth-input" placeholder="e.g. STU-12345">
                                    </div>
                                    <div class="mb-3">
                                        <div class="d-flex justify-content-between">
                                            <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                                            <a href="#" class="text-primary small text-decoration-none">Forgot?</a>
                                        </div>
                                        <input type="password" class="form-control auth-input" placeholder="••••••••">
                                    </div>
                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" id="remember">
                                        <label class="form-check-label small text-muted" for="remember">Keep me logged in</label>
                                    </div>
                                    <a href="dashboard.html" class="btn btn-primary w-100 py-2 rounded-3 fw-600 shadow-sm mb-3">login</a>
                                    
                                    <div class="text-center">
                                        <span class="small text-muted">Don't have an account?</span>
                                        <a href="sign-in.html" class="small text-primary fw-600 text-decoration-none ms-1">Create Account</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
